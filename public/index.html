<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>InstaSave • Instagram Video Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 650px;
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 32px 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #f97316, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 8px;
        }

        .badge {
            background: rgba(236, 72, 153, 0.2);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            color: #f9a8d4;
            border: 1px solid rgba(236, 72, 153, 0.4);
        }

        .sub {
            color: #9ca3af;
            margin: 12px 0 28px 0;
            border-left: 3px solid #f97316;
            padding-left: 14px;
            font-size: 14px;
        }

        .input-group {
            background: #0f172a;
            border-radius: 60px;
            border: 1px solid #334155;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 6px;
            margin-bottom: 20px;
            transition: all 0.2s;
        }

        .input-group:focus-within {
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2);
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 18px;
            font-size: 15px;
            color: white;
            outline: none;
            font-family: inherit;
        }

        .input-group input::placeholder {
            color: #5c6c8c;
        }

        .input-group button {
            background: linear-gradient(95deg, #f97316, #ec4899);
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            color: white;
            cursor: pointer;
            transition: transform 0.1s;
            font-family: inherit;
        }

        .input-group button:active {
            transform: scale(0.96);
        }

        .input-group button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loader {
            display: none;
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 3px solid rgba(249, 115, 22, 0.2);
            border-top-color: #f97316;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result {
            margin-top: 24px;
            display: none;
        }

        .video-card {
            background: #0f172a;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
        }

        .video-card video {
            width: 100%;
            max-height: 450px;
            border-radius: 16px;
            background: #000;
            margin-bottom: 16px;
        }

        .download-btn {
            background: #10b981;
            border: none;
            padding: 14px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            color: white;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            font-family: inherit;
        }

        .download-btn:hover {
            background: #059669;
        }

        .error {
            background: #7f1a1a;
            padding: 16px;
            border-radius: 20px;
            color: #fecaca;
            border-left: 4px solid #f87171;
            font-size: 14px;
        }

        .info {
            font-size: 11px;
            color: #6c7a9e;
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #1e293b;
        }

        .examples {
            font-size: 12px;
            color: #5c6c8c;
            margin-top: 12px;
            text-align: center;
        }

        @media (max-width: 550px) {
            .container {
                padding: 24px 20px;
            }
            h1 {
                font-size: 26px;
            }
            .input-group button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>
        📥 InstaSave
        <span class="badge">Free • No Login</span>
    </h1>
    <div class="sub">Download any public Instagram Reel, video post, or IGTV in original quality</div>

    <div class="input-group">
        <input type="text" id="videoUrl" placeholder="Paste Instagram video link here...">
        <button id="downloadBtn">Get Video</button>
    </div>

    <div id="loader" class="loader"></div>
    <div id="result" class="result"></div>

    <div class="examples">
        📌 Example: https://www.instagram.com/reel/Cx9ABC123/ or /p/Cx9ABC123/
    </div>
    <div class="info">
        🔓 Works with <strong>public videos only</strong> • Instagram Reels, Posts, IGTV<br>
        ⚡ No watermarks • Direct MP4 download • 100% free
    </div>
</div>

<script>
    const urlInput = document.getElementById('videoUrl');
    const downloadBtn = document.getElementById('downloadBtn');
    const loader = document.getElementById('loader');
    const resultDiv = document.getElementById('result');

    async function fetchVideo() {
        let url = urlInput.value.trim();
        
        if (!url) {
            showError('Please paste an Instagram video link');
            return;
        }
        
        if (!url.includes('instagram.com')) {
            showError('Please enter a valid Instagram URL (instagram.com/reel/... or /p/...)');
            return;
        }
        
        if (url.includes('/stories/')) {
            showError('Instagram Stories are not supported. Please use Reels or video posts.');
            return;
        }
        
        if (!url.startsWith('http')) {
            url = 'https://' + url;
            urlInput.value = url;
        }
        
        showLoader(true);
        hideResult();
        
        try {
            const response = await fetch('/api/download', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({ url: url })
            });
            
            const data = await response.json();
            
            if (!response.ok) {
                throw new Error(data.error || 'Failed to fetch video');
            }
            
            if (data.success && data.videoUrl) {
                showVideo(data.videoUrl);
            } else {
                throw new Error(data.error || 'No video found in this post');
            }
        } catch (error) {
            console.error('Error:', error);
            showError(error.message || 'Unable to download. Make sure the video is public and try again.');
        } finally {
            showLoader(false);
        }
    }
    
    function showVideo(videoUrl) {
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
            <div class="video-card">
                <video controls src="${escapeHtml(videoUrl)}"></video>
                <button class="download-btn" onclick="saveVideo('${escapeHtml(videoUrl)}')">⬇️ Download MP4 Video</button>
            </div>
        `;
        resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    window.saveVideo = async (url) => {
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = `instasave_${Date.now()}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(blobUrl);
        } catch (e) {
            window.open(url, '_blank');
        }
    };
    
    function showError(msg) {
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `<div class="error">⚠️ ${escapeHtml(msg)}</div>`;
    }
    
    function showLoader(show) {
        loader.style.display = show ? 'block' : 'none';
        downloadBtn.disabled = show;
    }
    
    function hideResult() {
        resultDiv.style.display = 'none';
        resultDiv.innerHTML = '';
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    downloadBtn.addEventListener('click', fetchVideo);
    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') fetchVideo();
    });
    
    // Auto-fix common URL patterns
    urlInput.addEventListener('blur', () => {
        let val = urlInput.value.trim();
        if (val && !val.startsWith('http')) {
            urlInput.value = 'https://' + val;
        }
    });
</script>
</body>
</html>
